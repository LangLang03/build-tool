project:
  name: android-test
  version: 1.0.0
  description: Android test project

directories:
  source: src/main
  build: build

plugins:
  - android

android:
  application:
    id: com.example.test
    version_name: 1.0.0
    version_code: 1

  sdk:
    compile_sdk: 34
    build_tools: 34.0.0
    min_sdk: 21
    target_sdk: 34

  build:
    type: debug
    minify: false
    shrink: false

  java:
    source: "11"
    target: "11"

  repositories:
    - https://maven.aliyun.com/repository/google
    - https://maven.aliyun.com/repository/public

  dependencies:
    implementation: []
    compile_only: []
