[build]
source_dir = "src"
build_dir = "build"
parallel = true
jobs = 4
incremental = true

[output]
verbose = false
quiet = false
color = true
unicode = true
timestamp = false

[log]
level = "INFO"
file = ""
max_size = 10485760
max_files = 5

[cache]
enabled = true
max_size = 1073741824
max_age = 604800
hash_algorithm = "md5"

[plugin]
auto_load = true
dirs = "plugins,~/.build-tool/plugins"
